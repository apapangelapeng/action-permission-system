services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aps
      POSTGRES_PASSWORD: aps
      POSTGRES_DB: aps
    volumes:
      - aps-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aps -d aps"]
      interval: 2s
      timeout: 2s
      retries: 15

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      APS_ADDR: ":8080"
      APS_DATABASE_URL: postgres://aps:aps@db:5432/aps
      APS_SEED: "1" # loads demo users/policies/history on a fresh database only
    ports:
      - "8080:8080"

volumes:
  aps-pgdata:
