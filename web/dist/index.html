<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Action Permission System</title>
<style>
  :root { --bg: #f6f7f9; --surface: #fff; --text: #1b2334; --muted: #5b6577; --accent: #2450c8; --ok: #1e7a4c; --err: #b03330; }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #11141b; --surface: #1a1f29; --text: #e7ebf3; --muted: #9aa4b8; --accent: #85a6f2; --ok: #55c48b; --err: #e57a72; }
  }
  body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: var(--bg); color: var(--text); font-family: "Avenir Next", "Segoe UI", system-ui, sans-serif; }
  .card { background: var(--surface); border-radius: 12px; padding: 40px 48px; max-width: 26rem; box-shadow: 0 2px 16px rgba(0,0,0,.08); }
  h1 { font-size: 1.3rem; margin: 0 0 6px; }
  p { color: var(--muted); font-size: .95rem; line-height: 1.5; margin: 8px 0 0; }
  .status { display: flex; align-items: center; gap: 8px; margin-top: 20px; font-size: .9rem; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--muted); }
  .dot.up { background: var(--ok); } .dot.down { background: var(--err); }
</style>
</head>
<body>
  <div class="card">
    <h1>Action Permission System</h1>
    <p>The service is running. The dashboard arrives in milestone&nbsp;2 — until then, the <code>/v1</code> API and <code>/healthz</code> are the front door.</p>
    <div class="status"><span class="dot" id="dot"></span><span id="msg">checking service…</span></div>
  </div>
  <script>
    fetch('/healthz').then(function (r) { return r.json(); }).then(function (h) {
      document.getElementById('dot').className = 'dot ' + (h.db === 'up' ? 'up' : 'down');
      document.getElementById('msg').textContent = 'service ' + h.status + ' · database ' + h.db;
    }).catch(function () {
      document.getElementById('dot').className = 'dot down';
      document.getElementById('msg').textContent = 'health check unreachable';
    });
  </script>
</body>
</html>
